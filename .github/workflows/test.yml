name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m unittest discover -s daily-news-wechat/tests -v
      - run: python -m py_compile daily-news-wechat/scripts/*.py
      - run: python -m unittest discover -s github-hot-wechat/tests -v
      - run: python -m py_compile github-hot-wechat/scripts/*.py
      - run: python -m unittest discover -s daily-news-research/tests -v
      - run: python -m py_compile daily-news-research/scripts/*.py
      - run: python -m unittest discover -s github-hot-research/tests -v
      - run: python -m py_compile github-hot-research/scripts/*.py
      - run: python -m unittest discover -s wechat-content/tests -v
      - run: python -m py_compile wechat-content/scripts/*.py
      - run: python -m unittest tests.test_modular_architecture -v
